<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarogya Clinic | Growth OS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           1. CSS VARIABLES & DESIGN SYSTEM
           ========================================= */
        :root {
            --primary: #0f766e; /* Teal */
            --primary-dark: #115e59;
            --primary-light: #ccfbf1;
            --secondary: #172B4D; 
            --success: #36B37E;
            --bg-base: #F4F5F7;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --text-main: #172B4D;
            --text-muted: #5E6C84;
            
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-lg: 0 12px 24px rgba(15,118,110,0.1);
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #E6FFFA 0%, transparent 40%);
            background-attachment: fixed;
        }

        h1, h2, h3, h4 { color: var(--secondary); font-weight: 700; letter-spacing: -0.5px; }
        a { text-decoration: none; color: inherit; cursor: pointer; }
        ul { list-style: none; }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .section { padding: 80px 0; }
        .text-center { text-align: center; }

        /* =========================================
           2. UI COMPONENTS & FORMS
           ========================================= */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 15px;
            transition: var(--transition); border: none; cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(15,118,110,0.3); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }

        /* Style the exact form tags requested without altering their structure */
        form { display: grid; gap: 16px; width: 100%; }
        input, select, textarea {
            width: 100%; padding: 14px 16px; border: 1px solid #DFE1E6; border-radius: 8px;
            font-size: 15px; background: white; transition: var(--transition); outline: none; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        textarea { resize: vertical; min-height: 100px; }

        /* =========================================
           3. NAVIGATION & SPA ROUTING
           ========================================= */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--secondary); display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--primary); }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-link { color: var(--text-muted); font-weight: 500; transition: var(--transition); cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: var(--primary); }

        .page-view { display: none; opacity: 0; animation: fadeIn 0.4s ease forwards; padding-top: 80px; }
        .page-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           4. LAYOUTS
           ========================================= */
        .hero { min-height: 70vh; display: flex; align-items: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; text-align: center; border-radius: 0 0 40px 40px; margin-bottom: 60px;}
        .hero h1 { font-size: 48px; color: white; margin-bottom: 16px; }
        .hero p { font-size: 18px; color: var(--primary-light); margin: 0 auto 32px; max-width: 600px; }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
        .card { background: white; padding: 24px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid #DFE1E6; transition: var(--transition); }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }

        .whatsapp {
            position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white;
            padding: 15px 18px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 100;
        }

        footer { text-align: center; padding: 30px; background: var(--secondary); color: white; margin-top: 40px; }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="container nav-container">
            <div class="logo">
                <i class="fa-solid fa-laptop-medical"></i> <span id="navClinicName">Aarogya Clinic</span>
            </div>
            <ul class="nav-links">
                <li><a class="nav-link active" data-target="home">Home</a></li>
                <li><a class="nav-link" data-target="booking">Book Appointment</a></li>
            </ul>
        </div>
    </nav>

    <main id="app">
        <section id="home" class="page-view active">
            <div class="hero">
                <div class="container">
                    <h1 id="clinicName">Clinic Loading...</h1>
                    <p id="clinicTag">Smart Healthcare System</p>
                    <button class="btn btn-outline" style="background: white;" onclick="navigateTo('booking')">Book Now</button>
                </div>
            </div>

            <div class="container section" style="padding-top:0;">
                <div class="text-center" style="margin-bottom: 40px;">
                    <h2>Our Services</h2>
                </div>
                <div class="grid-3" id="services"></div>
            </div>

            <div class="container section">
                <div class="text-center" style="margin-bottom: 40px;">
                    <h2>Our Specialists</h2>
                </div>
                <div class="grid-3" id="doctors"></div>
            </div>
        </section>

        <section id="booking" class="page-view">
            <div class="container section" style="max-width: 600px;">
                <div class="glass-panel" style="padding: 40px; background: white;">
                    <h2 style="margin-bottom: 24px; text-align: center;">Book Appointment</h2>
                    
                    <form id="leadForm">
                        <input type="text" name="name" placeholder="Your Name" required>
                        <input type="text" name="phone" placeholder="Phone Number" required>
                        <input type="email" name="email" placeholder="Email">
                        <select name="service" id="serviceSelect"></select>
                        <input type="date" name="date">
                        <textarea name="message" placeholder="Symptoms / Message"></textarea>
                        <button class="btn btn-primary" type="submit" style="width: 100%; padding: 16px; font-size: 16px;">Submit Request</button>
                    </form>
                    
                    <p id="status" style="margin-top: 16px; text-align: center; font-weight: 600; color: var(--primary);"></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        © 2026 Aarogya Clinic | Powered by Growth OS
    </footer>

    <a class="whatsapp" href="https://wa.me/919876543210?text=Hi%20I%20want%20to%20book%20an%20appointment" target="_blank">
        <i class="fa-brands fa-whatsapp" style="font-size: 20px; vertical-align: middle; margin-right: 5px;"></i> WhatsApp
    </a>

    <script>
        // SPA Routing Logic
        function navigateTo(targetId) {
            document.querySelectorAll('.page-view').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById(targetId).classList.add('active');
            document.querySelector(`.nav-link[data-target="${targetId}"]`)?.classList.add('active');
            window.scrollTo(0,0);
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navigateTo(link.getAttribute('data-target'));
            });
        });

        // ⚠️ REPLACE THIS WITH YOUR DEPLOYED WEB APP URL
        const API_URL = "https://script.google.com/macros/s/AKfycbx_xUa0L95fUuaHGdEF7TKvNeRCYqWJZTzvSZ9VeDWKUB31PjqrVOp-P_w15oXRl797/exec";

        async function loadData() {
            try {
                const res = await fetch(API_URL + "?t=" + Date.now());
                const data = await res.json();

                if(data.clinic && data.clinic[0]) {
                    const cName = data.clinic[0].clinic_name || "Aarogya Clinic";
                    document.getElementById("clinicName").innerText = cName;
                    document.getElementById("navClinicName").innerText = cName;
                }

                if(data.services) {
                    renderServices(data.services);
                    fillServiceDropdown(data.services);
                }
                
                if(data.doctors) {
                    renderDoctors(data.doctors);
                }
            } catch (error) {
                console.error("Error loading OS data:", error);
            }
        }

        function renderServices(services) {
            const container = document.getElementById("services");
            container.innerHTML = "";
            services.forEach(s => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `<h3>${s.title}</h3><p style="color: var(--text-muted); margin-top:8px;">${s.description}</p>`;
                container.appendChild(div);
            });
        }

        function renderDoctors(doctors) {
            const container = document.getElementById("doctors");
            container.innerHTML = "";
            doctors.forEach(d => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `
                    <img src="${d.image_url}" alt="${d.name}" style="width:100%; height:260px; object-fit:cover; border-radius:12px; margin-bottom:12px;">
                    <h3>${d.name}</h3>
                    <p style="color: var(--primary); font-weight: 600; margin-bottom: 4px;">${d.specialization}</p>
                    <p style="font-size: 14px; color: var(--text-muted);">${d.experience}</p>
                    <p style="margin-top: 12px; font-size: 15px;">${d.description}</p>
                `;
                container.appendChild(div);
            });
        }

        function fillServiceDropdown(services) {
            const select = document.getElementById("serviceSelect");
            select.innerHTML = '<option value="" disabled selected>Select Service...</option>';
            services.forEach(s => {
                const opt = document.createElement("option");
                opt.value = s.title;
                opt.innerText = s.title;
                select.appendChild(opt);
            });
        }

        // Exact original form submission listener
        document.getElementById("leadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const statusText = document.getElementById("status");
            
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const formData = Object.fromEntries(new FormData(e.target));

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(formData),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' } // Apps Script requirement
                });

                const result = await res.json();
                statusText.innerText = "✅ Request submitted. Your ID: " + result.leadId;
                statusText.style.color = "var(--success)";
                e.target.reset();
            } catch (error) {
                statusText.innerText = "❌ Error submitting request. Please try again.";
                statusText.style.color = "red";
                console.error(error);
            } finally {
                submitBtn.innerText = "Submit Request";
                submitBtn.disabled = false;
            }
        });

        // Init
        loadData();
    </script>
</body>
</html>
