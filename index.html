<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aarogya Clinic | Growth OS</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f6f8fb;
color: #111;
}

header {
background: linear-gradient(135deg, #0f766e, #115e59);
color: white;
padding: 60px 20px;
text-align: center;
animation: fadeDown 1s ease;
}

header h1 {
margin: 0;
font-size: 36px;
}

header p {
margin-top: 10px;
opacity: 0.9;
}

section {
padding: 40px 20px;
max-width: 1100px;
margin: auto;
}

.card {
background: white;
padding: 20px;
border-radius: 12px;
box-shadow: 0 10px 25px rgba(0,0,0,0.08);
margin: 15px 0;
transition: transform 0.3s ease;
}

.card:hover {
transform: translateY(-5px);
}

.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
}

.btn {
display: inline-block;
padding: 12px 18px;
background: #0f766e;
color: white;
border-radius: 8px;
text-decoration: none;
margin-top: 10px;
}

.btn:hover {
background: #115e59;
}

form {
display: grid;
gap: 10px;
}

input, select, textarea {
padding: 12px;
border-radius: 8px;
border: 1px solid #ddd;
}

footer {
text-align: center;
padding: 30px;
background: #111;
color: white;
margin-top: 40px;
}

.whatsapp {
position: fixed;
bottom: 20px;
right: 20px;
background: #25D366;
color: white;
padding: 15px 18px;
border-radius: 50px;
text-decoration: none;
font-weight: bold;
box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.fade-in {
animation: fadeIn 1s ease;
}

@keyframes fadeIn {
from {opacity: 0; transform: translateY(10px);}
to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeDown {
from {opacity: 0; transform: translateY(-20px);}
to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
<h1 id="clinicName">Clinic Loading...</h1>
<p id="clinicTag">Smart Healthcare System</p>
</header>

<section class="fade-in">
<h2>Our Services</h2>
<div class="grid" id="services"></div>
</section>

<section class="fade-in">
<h2>Doctors</h2>
<div class="grid" id="doctors"></div>
</section>

<section class="fade-in">
<h2>Book Appointment</h2>

<form id="leadForm">
<input type="text" name="name" placeholder="Your Name" required>
<input type="text" name="phone" placeholder="Phone Number" required>
<input type="email" name="email" placeholder="Email">
<select name="service" id="serviceSelect"></select>
<input type="date" name="date">
<textarea name="message" placeholder="Symptoms / Message"></textarea>
<button class="btn" type="submit">Submit Request</button>
</form>

<p id="status"></p>
</section>

<footer>
© 2026 Aarogya Clinic | Powered by Growth OS
</footer>

<a class="whatsapp"
href="https://wa.me/919876543210?text=Hi%20I%20want%20to%20book%20an%20appointment"
target="_blank">
WhatsApp
</a>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_xUa0L95fUuaHGdEF7TKvNeRCYqWJZTzvSZ9VeDWKUB31PjqrVOp-P_w15oXRl797/exec?t=" + Date.now();
  
async function loadData() {
const res = await fetch(API_URL);
const data = await res.json();

document.getElementById("clinicName").innerText = data.clinic[0].clinic_name || "Clinic";

renderServices(data.services);
renderDoctors(data.doctors);
fillServiceDropdown(data.services);
}

function renderServices(services) {
const container = document.getElementById("services");
container.innerHTML = "";

services.forEach(s => {
const div = document.createElement("div");
div.className = "card";
div.innerHTML = `
<h3>${s.title}</h3>
<p>${s.description}</p>
`;
container.appendChild(div);
});
}

function renderDoctors(doctors) {
  const container = document.getElementById("doctors");
  container.innerHTML = "";

  doctors.forEach(d => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${d.image_url}"
           alt="${d.name}"
           style="
             width:100%;
             height:260px;
             object-fit:cover;
             border-radius:12px;
             margin-bottom:12px;
           ">

      <h3>${d.name}</h3>
      <p><strong>${d.specialization}</strong></p>
      <p>${d.experience}</p>
      <p>${d.description}</p>
    `;

    container.appendChild(div);
  });
}
  function fillServiceDropdown(services) {
const select = document.getElementById("serviceSelect");

services.forEach(s => {
const opt = document.createElement("option");
opt.value = s.title;
opt.innerText = s.title;
select.appendChild(opt);
});
}

document.getElementById("leadForm").addEventListener("submit", async (e) => {
e.preventDefault();

const formData = Object.fromEntries(new FormData(e.target));

const res = await fetch(API_URL, {
method: "POST",
body: JSON.stringify(formData)
});

const result = await res.json();

document.getElementById("status").innerText =
"Request submitted. Your ID: " + result.leadId;

e.target.reset();
});

loadData();
</script>

</body>
</html>
